<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Controle Financeiro</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Estilos personalizados -->
    <link href="../css/style.css" rel="stylesheet">
</head>
<body class="bg-pattern">
    <div class="container d-flex align-items-center min-vh-100">
        <div class="row justify-content-center w-100">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg border-0 fade-in">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-person-plus icon-large text-primary"></i>
                            <h2 class="card-title mb-2">Crie sua conta</h2>
                            <p class="text-muted">Comece a controlar suas finanças hoje</p>
                        </div>

                        <form id="register-form">
                            <div class="mb-3">
                                <label for="nome" class="form-label">Nome completo</label>
                                <input type="text" class="form-control" id="nome" name="nome" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" name="senha" required>
                            </div>
                            
                            <div class="mb-4">
                                <label for="confirmar-senha" class="form-label">Confirmar senha</label>
                                <input type="password" class="form-control" id="confirmar-senha" name="confirmar-senha" required>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-person-plus me-2"></i>
                                    Cadastrar
                                </button>
                            </div>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">
                            <p class="mb-0">Já tem conta?</p>
                            <a href="login.html" class="btn btn-outline-primary mt-2">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Fazer login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- JavaScript personalizado -->
    <script src="../js/app.js"></script>
    
    <script>
        // Função para lidar com o cadastro
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmar-senha').value;
            
            if (!nome || !email || !senha || !confirmarSenha) {
                mostrarFeedback('Por favor, preencha todos os campos.', 'warning');
                return;
            }
            
            if (senha !== confirmarSenha) {
                mostrarFeedback('As senhas não coincidem.', 'warning');
                return;
            }
            
            if (senha.length < 6) {
                mostrarFeedback('A senha deve ter pelo menos 6 caracteres.', 'warning');
                return;
            }
            
            try {
                const success = await register(nome, email, senha);
                
                if (success) {
                    mostrarFeedback('Cadastro realizado com sucesso! Redirecionando para o login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    mostrarFeedback('Erro ao realizar cadastro. Tente novamente.', 'danger');
                }
            } catch (error) {
                console.error('Erro no cadastro:', error);
                mostrarFeedback('Erro ao realizar cadastro. Tente novamente.', 'danger');
            }
        });
    </script>
</body>
</html>
